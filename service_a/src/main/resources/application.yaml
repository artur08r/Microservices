spring:
  application:
    name: service_a

  data:
    mongodb:
      uri: ${MONGODB_URI}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      auto-offset-reset: earliest
      group-id: service-a
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.value.default.type: mentorship.roadmap.microservices.service_a.model.ServiceARequestDto
        spring.json.trusted.packages: mentorship.roadmap.microservices.service_a.model

service-b:
  url: ${SERVICE_B_URL}
  uri: ${SERVICE_B_URI}